name: issues-inbox

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
  workflow_dispatch:
    inputs:
      issue:
        description: Numero da issue a indexar e avaliar
        required: true
        type: string
      apply:
        description: Aplicar comentario e label permitidos pela avaliacao
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: agents-inbox-${{ github.event.issue.number || inputs.issue || github.run_id }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Receber, indexar e avaliar
        env:
          AGENTS_GITHUB_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_APPLY: ${{ inputs.apply }}
          INPUT_ISSUE: ${{ inputs.issue }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            result="$(node .ia.rules/core/runtime/scripts/issue-inbox.js fetch "$INPUT_ISSUE" --role constructor)"
            printf '%s\n' "$result"
            record="$(node -e "const data=JSON.parse(process.argv[1]); process.stdout.write(data.file || '');" "$result")"
            test -n "$record"
            assessment="$(node .ia.rules/core/runtime/scripts/issue-inbox.js evaluate "$record" --role constructor)"
            printf '%s\n' "$assessment"
            if [ "$INPUT_APPLY" = "true" ]; then
              node .ia.rules/core/runtime/scripts/issue-inbox.js apply "${record%.json}.json.assessment.json" --role constructor --authorize --issue "$INPUT_ISSUE"
            fi
          else
            node .ia.rules/core/runtime/scripts/issue-inbox.js process "$GITHUB_EVENT_PATH" --role constructor --authorize
          fi

      - name: Publicar inbox sanitizada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agents-issues-inbox-${{ github.run_id }}
          path: .ia.rules/local/upstream/inbox
          if-no-files-found: warn
          retention-days: 30
