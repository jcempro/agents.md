name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Versao do release no formato 0.0.0 ou 0.0.0-beta
        required: false
        type: string
  push:
    branches:
      - dev
      - main
      - master

permissions:
  contents: write
  issues: write

jobs:
  detect-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      file: ${{ steps.detect.outputs.file }}
      triggered: ${{ steps.detect.outputs.triggered }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: detect
        shell: bash
        run: |
          result="$(node .ia.rules/scenarios/release/scripts/release-workflow.js detect '${{ github.event.before }}' '${{ github.sha }}')"
          printf '%s\n' "$result"
          printf 'triggered=%s\n' "$(node -e "const data=JSON.parse(process.argv[1]); process.stdout.write(String(Boolean(data.triggered))); " "$result")" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$(node -e "const data=JSON.parse(process.argv[1]); process.stdout.write(data.version || '');" "$result")" >> "$GITHUB_OUTPUT"
          printf 'file=%s\n' "$(node -e "const data=JSON.parse(process.argv[1]); process.stdout.write(data.file || '');" "$result")" >> "$GITHUB_OUTPUT"

  release:
    needs:
      - detect-release
    if: github.event_name == 'workflow_dispatch' || needs.detect-release.outputs.triggered == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolver versao e gatilho
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          DETECT_FILE: ${{ needs.detect-release.outputs.file }}
          DETECT_VERSION: ${{ needs.detect-release.outputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
            release_file=''
            if [ -z "$version" ]; then
                version="$(node -e "const {resolveRelease}=require('./src/.ia.rules/core/runtime/scripts/repo-tools');process.stdout.write(resolveRelease('').version)")"
            fi
          else
            version="$DETECT_VERSION"
            release_file="$DETECT_FILE"
          fi
          printf 'RELEASE_VERSION=%s\n' "$version" >> "$GITHUB_ENV"
          printf 'RELEASE_FILE=%s\n' "$release_file" >> "$GITHUB_ENV"

      - name: Validar tag inexistente
        shell: bash
        run: |
          retry() {
            local attempt status
            local delays=(1 3)
            for attempt in 0 1 2; do
              if "$@"; then
                return 0
              else
                status=$?
              fi
              if [ "$attempt" -lt 2 ]; then
                sleep "${delays[$attempt]}"
              fi
            done
            return "$status"
          }
          if git rev-parse --verify "refs/tags/v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag local v${RELEASE_VERSION} ja existe." >&2
            exit 1
          fi
          remote_tag="$(retry git ls-remote --tags origin "refs/tags/v${RELEASE_VERSION}")"
          if [ -n "$remote_tag" ]; then
            echo "Tag remota v${RELEASE_VERSION} ja existe." >&2
            exit 1
          fi

      - name: Gerar release local
        run: |
          node .ia.rules/core/runtime/scripts/issue-lifecycle.js bind-release "$env:RELEASE_VERSION" --role constructor
          git diff --quiet -- .ia.rules/continue.ia
          if ($LASTEXITCODE -ne 0) {
            git add .ia.rules/continue.ia
            git commit -m "chore: vincula issues ao release v$env:RELEASE_VERSION"
          }
          node src/.ia.rules/core/runtime/scripts/repo-tools.js agent:release "$env:RELEASE_VERSION"
        shell: pwsh

      - name: Publicar release e finalizar marcador
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          retry() {
            local attempt status
            local delays=(1 3)
            for attempt in 0 1 2; do
              if "$@"; then
                return 0
              else
                status=$?
              fi
              if [ "$attempt" -lt 2 ]; then
                sleep "${delays[$attempt]}"
              fi
            done
            return "$status"
          }
          git tag "v${RELEASE_VERSION}"
          retry git push origin "v${RELEASE_VERSION}"
          retry gh release create "v${RELEASE_VERSION}" "dist/agents-v${RELEASE_VERSION}.zip" "dist/release-note.txt" --title "v${RELEASE_VERSION}" --notes-file "dist/release-note.txt" --latest
          node .ia.rules/scenarios/release/scripts/release-hooks.js published "$RELEASE_VERSION" "dist/agents-v${RELEASE_VERSION}.zip"
          AGENTS_GITHUB_TOKEN="$GH_TOKEN" node .ia.rules/core/runtime/scripts/issue-lifecycle.js complete-release "$RELEASE_VERSION" --role constructor --authorize
          git add .ia.rules/continue.ia
          node .ia.rules/scenarios/release/scripts/release-workflow.js finalize "$RELEASE_VERSION" "$RELEASE_FILE"
          retry git push origin "HEAD:${{ github.ref_name }}"
          # PROTECAO: release local altera artefatos rastreados que bloqueiam o checkout da primaria.
          git restore --worktree -- dist
          primary=''
          for candidate in main master; do
            if git ls-remote --exit-code --heads origin "$candidate" >/dev/null 2>&1; then
              primary="$candidate"
              break
            fi
          done
          if [ -n "$primary" ] && [ "$primary" != "${{ github.ref_name }}" ]; then
            git fetch origin "$primary" "${{ github.ref_name }}"
            git checkout -B "$primary" "origin/$primary"
            git merge --no-edit "origin/${{ github.ref_name }}"
            retry git push origin "$primary"
          fi
